<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Jewellery Daily Marketing AMS & Customer Lead Management</title>
<style>
:root{
  --gold:#D4AF37;
  --gold-dark:#b8962a;
  --bg:#fffdf7;
  --card:#ffffff;
  --text:#1a1a1a;
  --muted:#6b6b6b;
  --border:#efe5c8;
  --danger:#c0392b;
  --success:#2e7d32;
  --warning:#f9a825;
  --shadow:0 4px 16px rgba(0,0,0,.06);
  --radius:14px;
  --sidebar-w:240px;
  --top-h:64px;
  --font:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0f0e0a;
  --card:#1a1812;
  --text:#f5f3eb;
  --muted:#b8b0a0;
  --border:#2d2618;
  --shadow:0 4px 20px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font:inherit;color:inherit}
a{color:inherit;text-decoration:none}
.hidden{display:none !important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* Login */
#login-screen{
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  background:
    radial-gradient(1200px 600px at 10% -20%, rgba(212,175,55,.15), transparent),
    radial-gradient(1000px 500px at 110% 120%, rgba(212,175,55,.12), transparent),
    var(--bg);
}
.login-card{
  width:100%;
  max-width:420px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:32px 28px;
}
.brand{
  display:flex;align-items:center;gap:12px;margin-bottom:20px;
}
.brand-logo{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),var(--gold-dark));
  display:grid;place-items:center;color:#fff;
}
.brand h1{font-size:20px;margin:0;line-height:1.2}
.brand p{margin:0;color:var(--muted);font-size:13px}
.form-group{margin-bottom:16px}
.label{display:block;font-size:13px;margin-bottom:6px;color:var(--muted)}
.input{
  width:100%;padding:12px 14px;
  border:1px solid var(--border);
  border-radius:10px;background:var(--bg);
  outline:none;transition:border .2s;
  min-height:44px;
}
.input:focus{border-color:var(--gold)}
.check{display:flex;align-items:center;gap:8px;font-size:14px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 16px;border-radius:10px;border:1px solid transparent;
  background:var(--gold);color:#1a1a1a;font-weight:600;
  cursor:pointer;min-height:44px;transition:transform .05s,filter .2s;
}
.btn:hover{filter:brightness(1.05)}
.btn:active{transform:translateY(1px)}
.btn.secondary{background:transparent;border-color:var(--border);color:var(--text)}
.btn.danger{background:var(--danger);color:#fff}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text)}
.btn.icon{padding:10px;width:44px}
.login-meta{margin-top:14px;font-size:12px;color:var(--muted);line-height:1.5}

/* App Layout */
#main-app{display:grid;grid-template-rows:var(--top-h) 1fr;grid-template-columns:var(--sidebar-w) 1fr;height:100vh}
.topbar{
  grid-column:1/-1;
  display:flex;align-items:center;gap:12px;
  padding:0 16px;border-bottom:1px solid var(--border);
  background:var(--card);position:sticky;top:0;z-index:40;
}
.topbar .brand-mini{display:flex;align-items:center;gap:10px;font-weight:700}
.topbar .brand-mini .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:grid;place-items:center;color:#fff}
.spacer{flex:1}
.select{
  padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);min-height:44px;
}
.user-menu{position:relative}
.user-btn{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg);cursor:pointer;min-height:44px}
.user-btn img,.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold);display:grid;place-items:center;font-weight:700;color:#1a1a1a}
.dropdown{
  position:absolute;right:0;top:calc(100% + 8px);min-width:220px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);
  padding:6px;display:none;z-index:50;
}
.dropdown.open{display:block}
.dropdown button{width:100%;text-align:left;padding:10px 12px;border-radius:8px;border:0;background:transparent;cursor:pointer;min-height:44px}
.dropdown button:hover{background:var(--bg)}

.sidebar{
  border-right:1px solid var(--border);
  background:var(--card);
  padding:12px;
  overflow-y:auto;
}
.nav-group{display:flex;flex-direction:column;gap:4px}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border-radius:10px;color:var(--muted);
  cursor:pointer;min-height:44px;
}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(212,175,55,.15),transparent);color:var(--text);border-left:3px solid var(--gold);padding-left:11px}
.nav-item svg{width:20px;height:20px;flex-shrink:0}

.main{
  overflow-y:auto;padding:20px 20px 100px;
}
.page-head{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:18px}
.page-head h2{margin:0;font-size:22px}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;
  background:var(--bg);border:1px solid var(--border);font-size:12px;color:var(--muted)
}

/* Cards */
.grid{display:grid;gap:16px}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px;
}
.card h3{margin:0 0 8px;font-size:14px;color:var(--muted);font-weight:600}
.card .value{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.card .sub{font-size:12px;color:var(--muted);margin-top:4px}

/* Table */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--card)}
table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px}
thead th{
  text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);background:var(--bg);padding:12px 14px;border-bottom:1px solid var(--border);position:sticky;top:0
}
tbody td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:14px}
tbody tr:hover{background:rgba(212,175,55,.05)}
.actions{display:flex;gap:6px}
.icon-btn{
  width:36px;height:36px;display:grid;place-items:center;border-radius:8px;
  border:1px solid var(--border);background:var(--bg);cursor:pointer
}
.icon-btn:hover{border-color:var(--gold)}
.empty{
  padding:40px;text-align:center;color:var(--muted)
}
.pagination{display:flex;align-items:center;gap:8px;justify-content:flex-end;padding:12px}

/* Filters */
.filters{
  display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px
}
.filters .input,.filters .select{max-width:200px}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:100
}
.modal-backdrop.open{display:flex}
.modal{
  width:100%;max-width:960px;max-height:90vh;overflow:auto;
  background:var(--card);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow)
}
.modal header{
  position:sticky;top:0;background:var(--card);padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;z-index:2
}
.modal header h3{margin:0;font-size:18px;flex:1}
.modal .content{padding:20px}
.modal footer{
  position:sticky;bottom:0;background:var(--card);padding:14px 20px;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end
}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.form-grid .full{grid-column:1/-1}
.fieldset{border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px}
.fieldset legend{padding:0 6px;color:var(--muted);font-size:13px}
.checks{display:flex;flex-wrap:wrap;gap:12px}
.checks label{display:flex;align-items:center;gap:6px;font-size:14px}

/* Bottom Nav Mobile */
.bottom-nav{
  position:fixed;left:0;right:0;bottom:0;z-index:60;
  display:none;grid-template-columns:repeat(5,1fr);
  background:var(--card);border-top:1px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.bottom-nav button{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 4px;border:0;background:transparent;color:var(--muted);
  font-size:11px;min-height:56px;cursor:pointer
}
.bottom-nav button.active{color:var(--gold)}
.bottom-nav svg{width:22px;height:22px}

/* Responsive */
@media (max-width:1100px){
  .grid.cols-4{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:900px){
  #main-app{grid-template-columns:1fr}
  .sidebar{display:none}
  .bottom-nav{display:grid}
  .topbar{padding:0 12px}
  .main{padding:16px 16px 100px}
  .form-grid{grid-template-columns:1fr}
  .filters .input,.filters .select{max-width:100%;flex:1}
}
@media (max-width:600px){
  .grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr}
  .page-head{flex-direction:column;align-items:flex-start}
}

/* Print */
@media print{
  .topbar,.sidebar,.bottom-nav,.page-head .btn,.filters,.pagination,.actions{display:none !important}
  .main{padding:0}
  .card,.table-wrap{box-shadow:none;border:1px solid #000}
  body{background:#fff;color:#000}
}

/* Utility */
.row{display:flex;align-items:center;gap:10px}
.stack{display:flex;flex-direction:column;gap:10px}
.badge{
  display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;
  background:var(--bg);border:1px solid var(--border)
}
.badge.hot{background:rgba(192,57,43,.12);color:#c0392b;border-color:rgba(192,57,43,.3)}
.badge.warm{background:rgba(249,168,37,.15);color:#b58105;border-color:rgba(249,168,37,.3)}
.badge.cold{background:rgba(46,125,50,.12);color:#2e7d32;border-color:rgba(46,125,50,.3)}
.switch{
  position:relative;width:46px;height:28px;background:var(--border);border-radius:999px;cursor:pointer
}
.switch input{display:none}
.switch span{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .2s}
.switch input:checked + span{transform:translateX(18px)}
.switch input:checked ~ .track{background:var(--gold)}
.switch .track{position:absolute;inset:0;border-radius:999px;background:var(--border)}
.kbd{font-family:monospace;background:var(--bg);border:1px solid var(--border);padding:2px 6px;border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div id="app">
  <!-- LOGIN -->
  <section id="login-screen" aria-label="Login">
    <div class="login-card">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2l3 7h7l-5.5 4 2 7-6.5-4-6.5 4 2-7L2 9h7l3-7z" fill="currentColor"/></svg>
        </div>
        <div>
          <h1>Jewellery Daily Marketing AMS</h1>
          <p>Customer Lead Management System</p>
        </div>
      <form id="login-form">
        <div class="form-group">
          <label class="label" for="login-user">Username</label>
          <input id="login-user" class="input" autocomplete="username" required placeholder="superadmin" />
        </div>
        <div class="form-group">
          <label class="label" for="login-pass">Password</label>
          <input id="login-pass" class="input" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </div>
        <div class="form-group row" style="justify-content:space-between">
          <label class="check"><input type="checkbox" id="login-remember" /> Remember me</label>
          <button class="btn" type="submit" style="min-width:120px">Sign In</button>
        </div>
      </form>
      <div class="login-meta">
        Demo accounts:<br/>
        <span class="kbd">superadmin / admin123</span> <span class="kbd">manager.kkd / mgr123</span> <span class="kbd">exec.ravi / exe123</span>
      </div>
    </div>
  </section>

  <!-- APP -->
  <section id="main-app" hidden aria-label="Application">
    <header class="topbar">
      <div class="brand-mini">
        <div class="logo" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2l3 7h7l-5.5 4 2 7-6.5-4-6.5 4 2-7L2 9h7l3-7z" fill="currentColor"/></svg>
        </div>
        <span id="company-name-top">Jewellery AMS</span>
      </div>
      <select id="branch-filter-top" class="select" title="Branch filter" style="max-width:200px"></select>
      <div class="spacer"></div>
      <div class="user-menu">
        <button class="user-btn" id="user-btn" aria-haspopup="true" aria-expanded="false">
          <div class="user-avatar" id="user-avatar">SA</div>
          <div style="text-align:left;line-height:1.1;display:none;" class="user-info" id="user-info">
            <div id="user-name" style="font-weight:600;font-size:14px"></div>
            <div id="user-role" style="font-size:12px;color:var(--muted)"></div>
          </div>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="dropdown" id="user-dropdown" role="menu">
          <button id="theme-toggle">Toggle Dark Mode</button>
          <button id="logout-btn">Logout</button>
        </div>
      </div>
    </header>

    <aside class="sidebar" id="sidebar">
      <nav class="nav-group" id="nav-desktop"></nav>
    </aside>

    <main class="main" id="main-content" tabindex="-1"></main>

    <nav class="bottom-nav" id="nav-mobile"></nav>
  </section>
</div>

<!-- MODALS -->
<div class="modal-backdrop" id="modal-lead" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="lead-modal-title">
    <header>
      <h3 id="lead-modal-title">Add Lead</h3>
      <button class="icon-btn" data-close="modal-lead" aria-label="Close">✕</button>
    </header>
    <form id="lead-form">
      <div class="content">
        <fieldset class="fieldset">
          <legend>Visit Details</legend>
          <div class="form-grid">
            <div class="form-group">
              <label class="label">Date *</label>
              <input type="date" name="date" class="input" required />
            </div>
            <div class="form-group">
              <label class="label">Branch *</label>
              <select name="branchId" class="select" required></select>
            </div>
            <div class="form-group">
              <label class="label">Executive *</label>
              <select name="executiveId" class="select" required></select>
            </div>
            <div class="form-group">
              <label class="label">Marketing Type</label>
              <select name="marketingType" class="select">
                <option>Walk-in</option><option>Field Visit</option><option>Referral</option><option>Campaign</option><option>Social Media</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label">Area</label>
              <input name="area" class="input" placeholder="Locality" />
            </div>
            <div class="form-group">
              <label class="label">Street</label>
              <input name="street" class="input" placeholder="Street" />
            </div>
          </div>
        </fieldset>

        <fieldset class="fieldset">
          <legend>Customer</legend>
          <div class="form-grid">
            <div class="form-group">
              <label class="label">Customer Name *</label>
              <input name="customerName" class="input" required />
            </div>
            <div class="form-group">
              <label class="label">Mobile *</label>
              <input name="mobile" class="input" required pattern="^[6-9]\d{9}$" placeholder="10 digit" />
            </div>
            <div class="form-group">
              <label class="label">WhatsApp</label>
              <input name="whatsapp" class="input" pattern="^[6-9]\d{9}$" placeholder="10 digit" />
            </div>
            <div class="form-group">
              <label class="label">Gender</label>
              <select name="gender" class="select"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
            </div>
            <div class="form-group">
              <label class="label">Age Group</label>
              <select name="ageGroup" class="select"><option value="">Select</option><option>18-25</option><option>26-35</option><option>36-50</option><option>51+</option></select>
            </div>
            <div class="form-group">
              <label class="label">Customer Type</label>
              <select name="customerType" class="select"><option>New</option><option>Existing</option></select>
            </div>
          </div>
        </fieldset>

        <fieldset class="fieldset">
          <legend>Interest & Awareness</legend>
          <div class="form-grid">
            <div class="form-group">
              <label class="label">Aware of Brand?</label>
              <select name="aware" class="select"><option>Yes</option><option>No</option></select>
            </div>
            <div class="form-group">
              <label class="label">How Known</label>
              <input name="howKnown" class="input" placeholder="Friend, Ad, etc." />
            </div>
            <div class="form-group">
              <label class="label">Interest Level</label>
              <select name="interestLevel" class="select"><option>High</option><option>Medium</option><option>Low</option></select>
            </div>
            <div class="form-group">
              <label class="label">Lead Type</label>
              <select name="leadType" class="select"><option>Hot</option><option>Warm</option><option>Cold</option></select>
            </div>
            <div class="form-group full">
              <label class="label">Jewellery Interest</label>
              <div class="checks">
                <label><input type="checkbox" name="jewelleryInterest" value="Gold" /> Gold</label>
                <label><input type="checkbox" name="jewelleryInterest" value="Diamond" /> Diamond</label>
                <label><input type="checkbox" name="jewelleryInterest" value="Silver" /> Silver</label>
                <label><input type="checkbox" name="jewelleryInterest" value="Platinum" /> Platinum</label>
              </div>
            <div class="form-group">
              <label class="label">Budget</label>
              <select name="budget" class="select"><option value="">Select</option><option>&lt;25k</option><option>25k-50k</option><option>50k-1L</option><option>1L-3L</option><option>3L+</option></select>
            </div>
            <div class="form-group">
              <label class="label">Purchase Plan</label>
              <select name="purchasePlan" class="select"><option>Immediate</option><option>1 Month</option><option>3 Months</option><option>6 Months+</option></select>
            </div>
          </div>
        </fieldset>

        <fieldset class="fieldset">
          <legend>Scheme & Follow-up</legend>
          <div class="form-grid">
            <div class="form-group">
              <label class="label">Scheme Explained?</label>
              <select name="schemeExplained" class="select"><option>Yes</option><option>No</option></select>
            </div>
            <div class="form-group">
              <label class="label">Scheme Interested?</label>
              <select name="schemeInterested" class="select"><option>Yes</option><option>No</option><option>Maybe</option></select>
            </div>
            <div class="form-group">
              <label class="label">Monthly Amount</label>
              <input name="monthlyAmount" class="input" type="number" min="0" step="100" placeholder="₹" />
            </div>
            <div class="form-group">
              <label class="label">Pre-booking Interested?</label>
              <select name="prebookingInterested" class="select"><option>No</option><option>Yes</option></select>
            </div>
            <div class="form-group">
              <label class="label">Follow-up Date</label>
              <input name="followUpDate" class="input" type="date" />
            </div>
            <div class="form-group">
              <label class="label">Status</label>
              <select name="status" class="select"><option>Open</option><option>In Progress</option><option>Converted</option><option>Closed</option></select>
            </div>
            <div class="form-group full">
              <label class="label">Reason / Feedback</label>
              <textarea name="reason" class="input" rows="2" placeholder="Customer feedback"></textarea>
            </div>
            <div class="form-group full">
              <label class="label">Remarks</label>
              <textarea name="remarks" class="input" rows="2"></textarea>
            </div>
          </div>
        </fieldset>

        <fieldset class="fieldset">
          <legend>Referral</legend>
          <div class="form-grid">
            <div class="form-group">
              <label class="label">Referral Name</label>
              <input name="referralName" class="input" />
            </div>
            <div class="form-group">
              <label class="label">Referral Mobile</label>
              <input name="referralMobile" class="input" pattern="^[6-9]\d{9}$" placeholder="10 digit" />
            </div>
          </div>
        </fieldset>
      </div>
      <footer>
        <button type="button" class="btn secondary" data-close="modal-lead">Cancel</button>
        <button type="submit" class="btn">Save Lead</button>
      </footer>
    </form>
  </div>
</div>

<div class="modal-backdrop" id="modal-view" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <header>
      <h3 id="view-title">Lead Details</h3>
      <button class="icon-btn" data-close="modal-view" aria-label="Close">✕</button>
    </header>
    <div class="content" id="view-content"></div>
    <footer>
      <button class="btn secondary" data-close="modal-view">Close</button>

</div>

  <div class="modal" role="dialog" aria-modal="true" style="max-width:600px">
    <header>
      <h3 id="branch-modal-title">Add Branch</h3>

    <form id="branch-form">
      <div class="content">
        <div class="form-grid">
          <div class="form-group"><label class="label">Name *</label><input name="name" class="input" required /></div>
          <div class="form-group"><label class="label">Code *</label><input name="code" class="input" required /></div>
          <div class="form-group full"><label class="label">Address</label><input name="address" class="input" /></div>

          <div class="form-group"><label class="label">Name *</label><input name="name" class="input" required /></div>
          <div class="form-group"><label class="label">Role *</label><select name="role" class="select" required><option>Executive</option><option>Manager</option><option>Admin</option></select></div>
          <div class="form-group"><label class="label">Branch *</label><select name="branchId" class="select" required></select></div>

<script>
(() => {
  'use strict';

  const ICONS = {
    home:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 10v10h14V10"/></svg>`,
    leads:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6"/></svg>`,
    branches:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M6 21V7h12v14"/><path d="M9 7V3h6v4"/></svg>`,
    staff:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 8-6 8-6s8 2 8 6"/></svg>`,
    reports:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h16"/><rect x="6" y="10" width="3" height="7"/><rect x="11" y="6" width="3" height="11"/><rect x="16" y="12" width="3" height="5"/></svg>`,
    settings:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 0 0 1-1.51.09 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 0 0 1 .09-1.51 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09A1.65 0 0 1 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09c.3.46.46.99.46 1.54z"/></svg>`,
    add:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`,
    edit:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>`,
    delete:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>`,
    search:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>`,
    duplicate:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><rect x="4" y="4" width="11" height="11" rx="2"/></svg>`,
    view:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>`
  };

  const DB = (() => {
    const KEY = 'jams_db';
    const defaultDB = {
      settings:{companyName:'Jewellery AMS', logoDataUrl:'', theme:'light'},
      users:[
        {username:'superadmin',password:'admin123',role:'superadmin',name:'Super Admin',branchId:null},
        {username:'manager.kkd',password:'mgr123',role:'manager',name:'Manager KKD',branchId:'b1'},
        {username:'exec.ravi',password:'exe123',role:'executive',name:'Ravi Kumar',branchId:'b1'}
      ],
      branches:[],
      staff:[],
      leads:[],
      meta:{seeded:false}
    };
    function load(){ try{ const raw=localStorage.getItem(KEY); return raw?JSON.parse(raw):null }catch{ return null } }
    function save(db){ localStorage.setItem(KEY, JSON.stringify(db)); }
    function init(){
      let db = load();
      if(!db){ db = structuredClone(defaultDB); seed(db); save(db); }
      if(!db.meta.seeded){ seed(db); save(db); }
      return db;
    }
    function seed(db){
      db.branches = [
        {id:'b1',name:'Kakinada Main',code:'KKD',address:'Main Road, Kakinada',phone:'0884-234567'},
        {id:'b2',name:'Rajahmundry',code:'RJY',address:'Danavaipet, RJY',phone:'0883-123456'},
        {id:'b3',name:'Vijayawada',code:'VJA',address:'MG Road, VJA',phone:'0866-765432'}
      ];
      db.staff = [
        {id:'s1',name:'Ravi Kumar',role:'Executive',branchId:'b1',mobile:'9876543210',email:'ravi@jams.com'},
        {id:'s2',name:'Sita Devi',role:'Executive',branchId:'b1',mobile:'9876543211',email:'sita@jams.com'},
        {id:'s3',name:'Arjun Rao',role:'Manager',branchId:'b1',mobile:'9876543212',email:'arjun@jams.com'},
        {id:'s4',name:'Lakshmi',role:'Executive',branchId:'b2',mobile:'9876543213',email:'lakshmi@jams.com'},
        {id:'s5',name:'Kiran',role:'Executive',branchId:'b3',mobile:'9876543214',email:'kiran@jams.com'}
      ];
      const today = new Date();
      const fmt = d=>d.toISOString().slice(0,10);
      const rand = arr=>arr[Math.floor(Math.random()*arr.length)];
      const areas=['Sarpavaram','Gandhinagar','Bhanugudi','Seethampeta','Madhuranagar'];
      const names=['Priya','Anil','Deepak','Meena','Harish','Kavya','Suresh','Divya','Ramesh','Pooja'];
      db.leads=[];
      for(let i=0;i<20;i++){
        const d = new Date(today); d.setDate(today.getDate()-Math.floor(Math.random()*10));
        const mobile = '9' + (100000000 + i*12345).toString().slice(-9);
        db.leads.push({
          id:'l'+(i+1),
          date:fmt(d),
          branchId:rand(db.branches).id,
          executiveId:rand(db.staff).id,
          area:rand(areas), street:'',
          marketingType:rand(['Walk-in','Field Visit','Referral','Campaign','Social Media']),
          customerName:rand(names)+' '+rand(['Kumar','Rao','Devi','Sharma']),
          mobile, whatsapp:Math.random()>.5?mobile:'',
          gender:rand(['Male','Female','']), ageGroup:rand(['18-25','26-35','36-50','51+']),
          customerType:rand(['New','Existing']),
          aware:rand(['Yes','No']), howKnown:rand(['Friend','Ad','Hoarding','']),
          interestLevel:rand(['High','Medium','Low']),
          reason:'Interested in gold chain',
          jewelleryInterest:['Gold'],
          budget:rand(['<25k','25k-50k','50k-1L','1L-3L']),
          purchasePlan:rand(['Immediate','1 Month','3 Months']),
          schemeExplained:rand(['Yes','No']),
          schemeInterested:rand(['Yes','No','Maybe']),
          monthlyAmount:rand(['2000','5000','10000']),
          prebookingInterested:rand(['Yes','No']),
          feedback:'Good',
          leadType:rand(['Hot','Warm','Cold']),
          followUpDate:fmt(new Date(d.getTime()+86400000*7)),
          referralName: Math.random()>.7?'Friend':'',
          referralMobile:'',
          remarks:'',
          status:rand(['Open','In Progress','Converted']),
          createdAt:Date.now()-i*1000000,
          updatedAt:Date.now()-i*500000
        });
      }
      db.meta.seeded=true;
    }
    return {init,load,save,KEY};
  })();

  const Auth = (() => {
    const SKEY='jams_session';
    function getSession(){ try{return JSON.parse(localStorage.getItem(SKEY))}catch{return null} }
    function setSession(user,remember){ const data={user,ts:Date.now()}; (remember?localStorage:sessionStorage).setItem(SKEY, JSON.stringify(data)); }
    function clear(){ localStorage.removeItem(SKEY); sessionStorage.removeItem(SKEY); }
    function login(username,password,remember){
      const db=AppState.db;
      const user=db.users.find(u=>u.username===username && u.password===password);
      if(!user) return null;
      setSession({username:user.username,role:user.role,name:user.name,branchId:user.branchId},remember);
      return user;
    }
    function currentUser(){
      const s=getSession()||JSON.parse(sessionStorage.getItem(SKEY)||'null');
      return s?.user||null;
    }
    return {login,currentUser,clear,getSession};
  })();

  const AppState = {
    db: DB.init(),
    user: null,
    module: 'dashboard',
    branchFilter: 'all',
    leadsPage:1,
    leadsSearch:'',
    leadsFilters:{date:'',branchId:'',executiveId:'',leadType:''},
    editingLeadId:null,
    editingBranchId:null,
    editingStaffId:null
  };

  const UI = (() => {
    const $ = sel => document.querySelector(sel);
    const $$ = sel => [...document.querySelectorAll(sel)];
    const elMain = $('#main-content');
    const elLogin = $('#login-screen');
    const elApp = $('#main-app');
    const elNavDesk = $('#nav-desktop');
    const elNavMobi = $('#nav-mobile');
    const elBranchTop = $('#branch-filter-top');

    function toast(msg){ alert(msg); } // simple

    function formatDate(d){ return d; }

    function initTheme(){
      const theme = AppState.db.settings.theme||'light';
      document.documentElement.setAttribute('data-theme', theme);
    }
    function toggleTheme(){
      const cur=document.documentElement.getAttribute('data-theme');
      const next=cur==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme', next);
      AppState.db.settings.theme=next;
      DB.save(AppState.db);
    }

    function openModal(id){
      const bd = document.getElementById(id);
      bd.classList.add('open');
      bd.setAttribute('aria-hidden','false');
      const focusable=bd.querySelector('input,select,textarea,button');
      focusable?.focus();
      trapFocus(bd);
    }
    function closeModal(id){
      const bd=document.getElementById(id);
      bd.classList.remove('open');
      bd.setAttribute('aria-hidden','true');
    }
    function trapFocus(container){
      const focusables = container.querySelectorAll('a,button,input,select,textarea,[tabindex]:not([tabindex="-1"])');
      if(!focusables.length) return;
      const first=focusables[0], last=focusables[focusables.length-1];
      container.addEventListener('keydown', e=>{
        if(e.key==='Tab'){
          if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
          else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
        }
        if(e.key==='Escape'){ container.classList.remove('open'); }
      }, {once:true});
    }

    function navItemsForRole(role){
      const all=[
        {id:'dashboard',label:'Dashboard',icon:ICONS.home,roles:['superadmin','manager','executive']},
        {id:'leads',label:'Leads',icon:ICONS.leads,roles:['superadmin','manager','executive']},
        {id:'reports',label:'Reports',icon:ICONS.reports,roles:['superadmin','manager']},
        {id:'branches',label:'Branches',icon:ICONS.branches,roles:['superadmin','manager']},
        {id:'staff',label:'Staff',icon:ICONS.staff,roles:['superadmin','manager']},
        {id:'settings',label:'Settings',icon:ICONS.settings,roles:['superadmin']}
      ];
      return all.filter(i=>i.roles.includes(role));
    }

    function renderNav(){
      const items=navItemsForRole(AppState.user.role);
      elNavDesk.innerHTML='';
      elNavMobi.innerHTML='';
      items.forEach(it=>{
        const btnDesk=document.createElement('a');
        btnDesk.className='nav-item'+(AppState.module===it.id?' active':'');
        btnDesk.href='#';
        btnDesk.dataset.module=it.id;
        btnDesk.innerHTML=`${it.icon}<span>${it.label}</span>`;
        btnDesk.addEventListener('click',e=>{e.preventDefault(); navigate(it.id)});
        elNavDesk.appendChild(btnDesk);

        const btnMobi=document.createElement('button');
        btnMobi.className=it.id===AppState.module?'active':'';
        btnMobi.dataset.module=it.id;
        btnMobi.innerHTML=`${it.icon}<span>${it.label}</span>`;
        btnMobi.addEventListener('click',()=>navigate(it.id));
        elNavMobi.appendChild(btnMobi);
      });
    }

    function navigate(module){
      AppState.module=module;
      renderNav();
      Render.page();
      elMain.focus();
    }

    function populateBranchSelect(){
      const branches=AppState.db.branches;
      elBranchTop.innerHTML='<option value="all">All Branches</option>'+branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
      elBranchTop.value=AppState.branchFilter;
    }

    function updateUserUI(){
      $('#user-name').textContent=AppState.user.name;
      $('#user-role').textContent=AppState.user.role;
      $('#user-avatar').textContent=AppState.user.name.split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
      $('#company-name-top').textContent=AppState.db.settings.companyName||'Jewellery AMS';
      if(window.innerWidth>900) $('#user-info').style.display='block';
    }

    function showApp(){
      elLogin.hidden=true;
      elApp.hidden=false;
      initTheme();
      populateBranchSelect();
      updateUserUI();
      renderNav();
      Render.page();
    }
    function showLogin(){
      elApp.hidden=true;
      elLogin.hidden=false;
    }

    return {$,$$,elMain,openModal,closeModal,navigate,showApp,showLogin,toast,toggleTheme,populateBranchSelect,formatDate,initTheme};
  })();

  const Render = (() => {
    const {$,elMain} = UI;

    function page(){
      switch(AppState.module){
        case 'dashboard': return renderDashboard();
        case 'leads': return renderLeads();
        case 'branches': return renderBranches();
        case 'staff': return renderStaff();
        case 'reports': return renderReports();
        case 'settings': return renderSettings();
      }
    }

    function filterLeadsBase(leads){
      const bf=AppState.branchFilter;
      if(bf!=='all') leads=leads.filter(l=>l.branchId===bf);
      return leads;
    }

    function renderDashboard(){
      const leads=filterLeadsBase(AppState.db.leads);
      const todayStr=new Date().toISOString().slice(0,10);
      const todayLeads=leads.filter(l=>l.date===todayStr);
      const card=(title,val,sub='')=>`
        <div class="card">
          <h3>${title}</h3>
          <div class="value">${val}</div>
          ${sub?`<div class="sub">${sub}</div>`:''}
        </div>`;
      const newCount=todayLeads.filter(l=>l.customerType==='New').length;
      const existCount=todayLeads.filter(l=>l.customerType==='Existing').length;
      const aware=todayLeads.filter(l=>l.aware==='Yes').length;
      const notAware=todayLeads.length-aware;
      const scheme=todayLeads.filter(l=>l.schemeInterested==='Yes').length;
      const hot=todayLeads.filter(l=>l.leadType==='Hot').length;
      const warm=todayLeads.filter(l=>l.leadType==='Warm').length;
      const cold=todayLeads.filter(l=>l.leadType==='Cold').length;
      const referrals=todayLeads.filter(l=>l.referralName).length;

      elMain.innerHTML=`
        <div class="page-head">
          <h2>Dashboard</h2>
          <span class="chip">Today: ${todayStr}</span>
        </div>
        <div class="grid cols-4">
          ${card('Today Visits', todayLeads.length)}
          ${card('Customers Contacted', todayLeads.length)}
          ${card('New / Existing', `${newCount} / ${existCount}`)}
          ${card('Aware / Not Aware', `${aware} / ${notAware}`)}
          ${card('Scheme Interested', scheme)}
          ${card('Hot / Warm / Cold', `${hot} / ${warm} / ${cold}`)}
          ${card('Referrals', referrals)}
          ${card('Total Leads', leads.length)}
        </div>
        <div class="grid cols-2" style="margin-top:16px">
          <div class="card">
            <h3>Leads Last 7 Days</h3>
            <canvas id="dashChart" height="180"></canvas>
          </div>
          <div class="card">
            <h3>Recent Entries</h3>
            ${renderRecentTable(leads.slice().sort((a,b)=>b.createdAt-a.createdAt).slice(0,5))}
          </div>
        </div>
      `;
      drawChart();
    }

    function renderRecentTable(rows){
      if(!rows.length) return `<div class="empty">No entries yet</div>`;
      return `<div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Customer</th><th>Mobile</th><th>Lead Type</th><th>Status</th></tr></thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td>${r.date}</td>
              <td>${escapeHtml(r.customerName)}</td>
              <td>${r.mobile}</td>
              <td><span class="badge ${r.leadType.toLowerCase()}">${r.leadType}</span></td>
              <td>${r.status}</td>
            </tr>`).join('')}
        </tbody>
      </table></div>`;
    }

    function drawChart(){
      const canvas=document.getElementById('dashChart');
      if(!canvas) return;
      const ctx=canvas.getContext('2d');
      const leads=filterLeadsBase(AppState.db.leads);
      const days=[...Array(7)].map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-6+i); return d.toISOString().slice(0,10); });
      const counts=days.map(d=>leads.filter(l=>l.date===d).length);
      const w=canvas.width=canvas.offsetWidth; const h=canvas.height=180;
      ctx.clearRect(0,0,w,h);
      const max=Math.max(1,...counts);
      const barW=w/(days.length*1.5);
      ctx.font='12px sans-serif'; ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--muted');
      counts.forEach((c,i)=>{
        const x= i*(barW*1.5)+barW*0.25;
        const bh=(c/max)*(h-40);
        const y=h-bh-20;
        ctx.fillStyle='#D4AF37';
        ctx.fillRect(x,y,barW,bh);
        ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--text');
        ctx.fillText(c.toString(), x+barW/2-4, y-4);
        ctx.fillStyle=getComputedStyle(document.documentElement).getPropertyValue('--muted');
        ctx.fillText(days[i].slice(5), x, h-4);
      });
    }

    function renderLeads(){
      const {leadsSearch,leadsFilters,leadsPage}=AppState;
      let leads=filterLeadsBase(AppState.db.leads.slice());
      if(leadsSearch){
        const q=leadsSearch.toLowerCase();
        leads=leads.filter(l=> l.customerName.toLowerCase().includes(q) || l.mobile.includes(q) || l.area.toLowerCase().includes(q));
      }
      if(leadsFilters.date) leads=leads.filter(l=>l.date===leadsFilters.date);
      if(leadsFilters.branchId) leads=leads.filter(l=>l.branchId===leadsFilters.branchId);
      if(leadsFilters.executiveId) leads=leads.filter(l=>l.executiveId===leadsFilters.executiveId);
      if(leadsFilters.leadType) leads=leads.filter(l=>l.leadType===leadsFilters.leadType);
      leads.sort((a,b)=>b.createdAt-a.createdAt);
      const total=leads.length;
      const per=10;
      const pages=Math.max(1,Math.ceil(total/per));
      AppState.leadsPage=Math.min(AppState.leadsPage,pages);
      const start=(AppState.leadsPage-1)*per;
      const pageLeads=leads.slice(start,start+per);

      elMain.innerHTML=`
        <div class="page-head">
          <h2>Leads</h2>
          <div class="spacer"></div>
          <button class="btn" id="add-lead-btn">${ICONS.add} Add Lead</button>
        </div>
        <div class="filters">
          <div style="position:relative;flex:1;min-width:220px">
            <input id="leads-search" class="input" placeholder="Search name, mobile, area" value="${escapeAttr(leadsSearch)}" />
          </div>
          <input type="date" id="filter-date" class="input" value="${leadsFilters.date}" />
          <select id="filter-branch" class="select"><option value="">All Branches</option>${AppState.db.branches.map(b=>`<option value="${b.id}" ${leadsFilters.branchId===b.id?'selected':''}>${b.name}</option>`).join('')}</select>
          <select id="filter-staff" class="select"><option value="">All Staff</option>${AppState.db.staff.map(s=>`<option value="${s.id}" ${leadsFilters.executiveId===s.id?'selected':''}>${s.name}</option>`).join('')}</select>
          <select id="filter-leadtype" class="select"><option value="">All Types</option>${['Hot','Warm','Cold'].map(t=>`<option ${leadsFilters.leadType===t?'selected':''}>${t}</option>`).join('')}</select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Customer</th><th>Mobile</th><th>Area</th><th>Interest</th><th>Lead Type</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${pageLeads.length? pageLeads.map(l=>`
                <tr>
                  <td>${l.date}</td>
                  <td>${escapeHtml(l.customerName)}</td>
                  <td>${l.mobile}</td>
                  <td>${escapeHtml(l.area||'')}</td>
                  <td>${(l.jewelleryInterest||[]).join(', ')}</td>
                  <td><span class="badge ${l.leadType.toLowerCase()}">${l.leadType}</span></td>
                  <td>${l.status}</td>
                  <td class="actions">
                    <button class="icon-btn" title="View" data-action="view" data-id="${l.id}">${ICONS.view}</button>
                    <button class="icon-btn" title="Edit" data-action="edit" data-id="${l.id}">${ICONS.edit}</button>
                    <button class="icon-btn" title="Duplicate" data-action="dup" data-id="${l.id}">${ICONS.duplicate}</button>
                    <button class="icon-btn" title="Delete" data-action="del" data-id="${l.id}">${ICONS.delete}</button>
                  </td>
                </tr>
              `).join('') : `<tr><td colspan="8"><div class="empty">No leads found</div></td></tr>`}
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <span class="chip">Page ${AppState.leadsPage} / ${pages} • ${total} records</span>
          <button class="btn secondary" id="prev-page" ${AppState.leadsPage===1?'disabled':''}>Prev</button>
          <button class="btn secondary" id="next-page" ${AppState.leadsPage===pages?'disabled':''}>Next</button>
        </div>
      `;
      // events
      $('#add-lead-btn').onclick=()=>openLeadForm();
      $('#leads-search').oninput=e=>{ AppState.leadsSearch=e.target.value; AppState.leadsPage=1; renderLeads(); };
      $('#filter-date').onchange=e=>{ AppState.leadsFilters.date=e.target.value; AppState.leadsPage=1; renderLeads(); };
      $('#filter-branch').onchange=e=>{ AppState.leadsFilters.branchId=e.target.value; AppState.leadsPage=1; renderLeads(); };
      $('#filter-staff').onchange=e=>{ AppState.leadsFilters.executiveId=e.target.value; AppState.leadsPage=1; renderLeads(); };
      $('#filter-leadtype').onchange=e=>{ AppState.leadsFilters.leadType=e.target.value; AppState.leadsPage=1; renderLeads(); };
      $('#prev-page')?.addEventListener('click',()=>{AppState.leadsPage--; renderLeads();});
      $('#next-page')?.addEventListener('click',()=>{AppState.leadsPage++; renderLeads();});
      elMain.querySelectorAll('button[data-action]').forEach(btn=>{
        btn.onclick=()=>{
          const id=btn.dataset.id; const act=btn.dataset.action;
          if(act==='edit') openLeadForm(id);
          if(act==='view') viewLead(id);
          if(act==='dup') duplicateLead(id);
          if(act==='del') deleteLead(id);
        };
      });
    }

    function openLeadForm(id=null){
      AppState.editingLeadId=id;
      const form=document.getElementById('lead-form');
      form.reset();
      // populate selects
      const branchSel=form.querySelector('[name=branchId]');
      branchSel.innerHTML=AppState.db.branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
      const execSel=form.querySelector('[name=executiveId]');
      execSel.innerHTML=AppState.db.staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
      if(id){
        const l=AppState.db.leads.find(x=>x.id===id);
        if(!l) return;
        document.getElementById('lead-modal-title').textContent='Edit Lead';
        for(const [k,v] of Object.entries(l)){
          const el=form.elements.namedItem(k);
          if(!el) continue;
          if(k==='jewelleryInterest'){
            form.querySelectorAll('[name=jewelleryInterest]').forEach(cb=>{cb.checked= v.includes(cb.value)});
          }else if(el.type==='checkbox') el.checked=!!v;
          else el.value=v??'';
        }
      }else{
        document.getElementById('lead-modal-title').textContent='Add Lead';
        form.elements.namedItem('date').value=new Date().toISOString().slice(0,10);
        form.elements.namedItem('status').value='Open';
      }
      UI.openModal('modal-lead');
    }

    function viewLead(id){
      const l=AppState.db.leads.find(x=>x.id===id);
      if(!l) return;
      const branch=AppState.db.branches.find(b=>b.id===l.branchId)?.name||'';
      const exec=AppState.db.staff.find(s=>s.id===l.executiveId)?.name||'';
      document.getElementById('view-title').textContent=l.customerName;
      document.getElementById('view-content').innerHTML=`
        <div class="grid cols-2">
          <div><strong>Date:</strong> ${l.date}</div>
          <div><strong>Branch:</strong> ${branch}</div>
          <div><strong>Executive:</strong> ${exec}</div>
          <div><strong>Mobile:</strong> ${l.mobile}</div>
          <div><strong>Area:</strong> ${l.area}</div>
          <div><strong>Lead Type:</strong> ${l.leadType}</div>
          <div class="full"><strong>Interest:</strong> ${(l.jewelleryInterest||[]).join(', ')}</div>
          <div class="full"><strong>Remarks:</strong> ${escapeHtml(l.remarks||'')}</div>
        </div>
      `;
      UI.openModal('modal-view');
    }

    function duplicateLead(id){
      const l=AppState.db.leads.find(x=>x.id===id);
      if(!l) return;
      const copy={...l,id:'l'+Date.now(),createdAt:Date.now(),updatedAt:Date.now(),customerName:l.customerName+' (Copy)'};
      AppState.db.leads.unshift(copy);
      DB.save(AppState.db);
      UI.toast('Duplicated');
      renderLeads();
    }

    function deleteLead(id){
      if(!confirm('Delete this lead?')) return;
      AppState.db.leads=AppState.db.leads.filter(l=>l.id!==id);
      DB.save(AppState.db);
      renderLeads();
    }

    function renderBranches(){
      elMain.innerHTML=`
        <div class="page-head">
          <h2>Branches</h2>
          <div class="spacer"></div>
          <button class="btn" id="add-branch">${ICONS.add} Add Branch</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Code</th><th>Phone</th><th>Address</th><th>Actions</th></tr></thead>
            <tbody>
              ${AppState.db.branches.map(b=>`
                <tr>
                  <td>${escapeHtml(b.name)}</td>
                  <td>${b.code}</td>
                  <td>${b.phone||''}</td>
                  <td>${escapeHtml(b.address||'')}</td>
                  <td class="actions">
                    <button class="icon-btn" data-action="edit" data-id="${b.id}">${ICONS.edit}</button>
                    <button class="icon-btn" data-action="del" data-id="${b.id}">${ICONS.delete}</button>
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
      $('#add-branch').onclick=()=>openBranchForm();
      elMain.querySelectorAll('button[data-action]').forEach(btn=>{
        const id=btn.dataset.id;
        if(btn.dataset.action==='edit') btn.onclick=()=>openBranchForm(id);
        if(btn.dataset.action==='del') btn.onclick=()=>{ if(confirm('Delete branch?')){ AppState.db.branches=AppState.db.branches.filter(b=>b.id!==id); DB.save(AppState.db); renderBranches(); } };
      });
    }

    function openBranchForm(id=null){
      AppState.editingBranchId=id;
      const form=document.getElementById('branch-form');
      form.reset();
      if(id){
        const b=AppState.db.branches.find(x=>x.id===id);
        document.getElementById('branch-modal-title').textContent='Edit Branch';
        form.name.value=b.name; form.code.value=b.code; form.address.value=b.address||''; form.phone.value=b.phone||'';
      }else{
        document.getElementById('branch-modal-title').textContent='Add Branch';
      }
      UI.openModal('modal-branch');
    }

    function renderStaff(){
      elMain.innerHTML=`
        <div class="page-head">
          <h2>Staff</h2>
          <div class="spacer"></div>
          <button class="btn" id="add-staff">${ICONS.add} Add Staff</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Role</th><th>Branch</th><th>Mobile</th><th>Email</th><th>Actions</th></tr></thead>
            <tbody>
              ${AppState.db.staff.map(s=>{
                const br=AppState.db.branches.find(b=>b.id===s.branchId)?.name||'';
                return `<tr>
                  <td>${escapeHtml(s.name)}</td>
                  <td>${s.role}</td>
                  <td>${br}</td>
                  <td>${s.mobile||''}</td>
                  <td>${s.email||''}</td>
                  <td class="actions">
                    <button class="icon-btn" data-action="edit" data-id="${s.id}">${ICONS.edit}</button>
                    <button class="icon-btn" data-action="del" data-id="${s.id}">${ICONS.delete}</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
      $('#add-staff').onclick=()=>openStaffForm();
      elMain.querySelectorAll('button[data-action]').forEach(btn=>{
        const id=btn.dataset.id;
        if(btn.dataset.action==='edit') btn.onclick=()=>openStaffForm(id);
        if(btn.dataset.action==='del') btn.onclick=()=>{ if(confirm('Delete staff?')){ AppState.db.staff=AppState.db.staff.filter(s=>s.id!==id); DB.save(AppState.db); renderStaff(); } };
      });
    }

    function openStaffForm(id=null){
      AppState.editingStaffId=id;
      const form=document.getElementById('staff-form');
      form.reset();
      const branchSel=form.querySelector('[name=branchId]');
      branchSel.innerHTML=AppState.db.branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
      if(id){
        const s=AppState.db.staff.find(x=>x.id===id);
        document.getElementById('staff-modal-title').textContent='Edit Staff';
        form.name.value=s.name; form.role.value=s.role; form.branchId.value=s.branchId; form.mobile.value=s.mobile||''; form.email.value=s.email||'';
      }else{
        document.getElementById('staff-modal-title').textContent='Add Staff';
      }
      UI.openModal('modal-staff');
    }

    function renderReports(){
      elMain.innerHTML=`
        <div class="page-head">
          <h2>Reports</h2>
          <div class="spacer"></div>
          <button class="btn secondary" id="print-btn">Print</button>
          <button class="btn" id="export-csv">Export CSV</button>
        </div>
        <div class="filters">
          <input type="date" id="rep-from" class="input" />
          <input type="date" id="rep-to" class="input" />
          <select id="rep-branch" class="select"><option value="">All Branches</option>${AppState.db.branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select>
          <select id="rep-staff" class="select"><option value="">All Staff</option>${AppState.db.staff.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
          <button class="btn secondary" id="rep-apply">Apply</button>
        </div>
        <div id="rep-result"></div>
      `;
      $('#print-btn').onclick=()=>window.print();
      $('#export-csv').onclick=exportCSV;
      $('#rep-apply').onclick=applyReport;
      applyReport();
    }

    function applyReport(){
      const from=$('#rep-from').value;
      const to=$('#rep-to').value;
      const br=$('#rep-branch').value;
      const st=$('#rep-staff').value;
      let leads=AppState.db.leads.slice();
      if(from) leads=leads.filter(l=>l.date>=from);
      if(to) leads=leads.filter(l=>l.date<=to);
      if(br) leads=leads.filter(l=>l.branchId===br);
      if(st) leads=leads.filter(l=>l.executiveId===st);
      const total=leads.length;
      const hot=leads.filter(l=>l.leadType==='Hot').length;
      const warm=leads.filter(l=>l.leadType==='Warm').length;
      const cold=leads.filter(l=>l.leadType==='Cold').length;
      const scheme=leads.filter(l=>l.schemeInterested==='Yes').length;
      const converted=leads.filter(l=>l.status==='Converted').length;
      $('#rep-result').innerHTML=`
        <div class="grid cols-3">
          <div class="card"><h3>Total Leads</h3><div class="value">${total}</div></div>
          <div class="card"><h3>Hot/Warm/Cold</h3><div class="value">${hot}/${warm}/${cold}</div></div>
          <div class="card"><h3>Scheme Interested</h3><div class="value">${scheme}</div></div>
          <div class="card"><h3>Converted</h3><div class="value">${converted}</div></div>
        </div>
        <div class="card" style="margin-top:16px">
          <h3>Details</h3>
          <div class="table-wrap">
            <table><thead><tr><th>Date</th><th>Customer</th><th>Mobile</th><th>Branch</th><th>Staff</th><th>Type</th><th>Status</th></tr></thead>
            <tbody>
              ${leads.slice(0,200).map(l=>{
                const br=AppState.db.branches.find(b=>b.id===l.branchId)?.code||'';
                const st=AppState.db.staff.find(s=>s.id===l.executiveId)?.name||'';
                return `<tr><td>${l.date}</td><td>${escapeHtml(l.customerName)}</td><td>${l.mobile}</td><td>${br}</td><td>${escapeHtml(st)}</td><td>${l.leadType}</td><td>${l.status}</td></tr>`;
              }).join('')}
            </tbody></table>
          </div>
        </div>
      `;
    }

    function exportCSV(){
      const rows=[['Date','Customer','Mobile','Area','Branch','Staff','Lead Type','Status','Interest','Scheme']];
      AppState.db.leads.forEach(l=>{
        const br=AppState.db.branches.find(b=>b.id===l.branchId)?.name||'';
        const st=AppState.db.staff.find(s=>s.id===l.executiveId)?.name||'';
        rows.push([l.date,l.customerName,l.mobile,l.area,br,st,l.leadType,l.status,(l.jewelleryInterest||[]).join('|'),l.schemeInterested]);
      });
      const csv=rows.map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob=new Blob([csv],{type:'text/csv'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download='leads.csv'; a.click(); URL.revokeObjectURL(url);
    }

    function renderSettings(){
      const s=AppState.db.settings;
      elMain.innerHTML=`
        <div class="page-head"><h2>Settings</h2></div>
        <div class="grid cols-2">
          <div class="card">
            <h3>Company</h3>
            <div class="form-grid">
              <div class="form-group full">
                <label class="label">Company Name</label>
                <input id="set-company" class="input" value="${escapeAttr(s.companyName)}" />
              </div>
              <div class="form-group full">
                <label class="label">Logo</label>
                <input type="file" id="set-logo" accept="image/*" class="input" />
                <div style="margin-top:8px">${s.logoDataUrl?`<img src="${s.logoDataUrl}" alt="logo" style="max-height:60px;border-radius:8px;border:1px solid var(--border)"/>`:''}</div>
              </div>
              <div class="form-group full">
                <button class="btn" id="save-company">Save</button>
              </div>
            </div>
          </div>
          <div class="card">
            <h3>Theme</h3>
            <div class="row">
              <span>Light</span>
              <label class="switch"><input type="checkbox" id="theme-switch" ${document.documentElement.getAttribute('data-theme')==='dark'?'checked':''}><span></span><div class="track"></div></label>
              <span>Dark</span>
            </div>
          <div class="card">
            <h3>Backup & Restore</h3>
            <div class="stack">
              <button class="btn secondary" id="backup-btn">Download Backup JSON</button>
              <input type="file" id="restore-file" accept="application/json" class="input" />
              <button class="btn danger" id="restore-btn">Restore from File</button>
            </div>
          </div>
        </div>
      `;
      $('#save-company').onclick=()=>{
        AppState.db.settings.companyName=$('#set-company').value.trim()||'Jewellery AMS';
        DB.save(AppState.db);
        UI.populateBranchSelect();
        UI.updateUserUI();
        UI.toast('Saved');
      };
      $('#set-logo').onchange=e=>{
        const file=e.target.files[0]; if(!file) return;
        const reader=new FileReader();
        reader.onload=()=>{ AppState.db.settings.logoDataUrl=reader.result; DB.save(AppState.db); renderSettings(); };
        reader.readAsDataURL(file);
      };
      $('#theme-switch').onchange=e=>{ UI.toggleTheme(); };
      $('#backup-btn').onclick=()=>{
        const blob=new Blob([JSON.stringify(AppState.db,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a'); a.href=url; a.download='jams_backup.json'; a.click(); URL.revokeObjectURL(url);
      };
      $('#restore-btn').onclick=()=>{
        const file=$('#restore-file').files[0]; if(!file) return alert('Select file');
        const reader=new FileReader();
        reader.onload=()=>{
          try{
            const data=JSON.parse(reader.result);
            if(!data.branches||!data.leads) throw new Error('Invalid');
            if(confirm('Replace all data?')){
              AppState.db=data;
              DB.save(AppState.db);
              location.reload();
            }
          }catch{ alert('Invalid file'); }
        };
        reader.readAsText(file);
      };
    }

    function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function escapeAttr(s){ return escapeHtml(s).replace(/"/g,'&quot;'); }

    return {page,openLeadForm,renderLeads};
  })();

  // EVENT BINDINGS
  function bindGlobal(){
    // login
    document.getElementById('login-form').addEventListener('submit',e=>{
      e.preventDefault();
      const u=document.getElementById('login-user').value.trim();
      const p=document.getElementById('login-pass').value;
      const rem=document.getElementById('login-remember').checked;
      const user=Auth.login(u,p,rem);
      if(!user){ alert('Invalid credentials'); return; }
      AppState.user=user;
      UI.showApp();
    });

    // user menu
    const userBtn=document.getElementById('user-btn');
    const dropdown=document.getElementById('user-dropdown');
    userBtn.addEventListener('click',()=>{ dropdown.classList.toggle('open'); userBtn.setAttribute('aria-expanded',dropdown.classList.contains('open')); });
    document.addEventListener('click',e=>{ if(!e.target.closest('.user-menu')) dropdown.classList.remove('open'); });
    document.getElementById('logout-btn').addEventListener('click',()=>{ Auth.clear(); location.reload(); });
    document.getElementById('theme-toggle').addEventListener('click',()=>UI.toggleTheme());

    // branch filter top
    document.getElementById('branch-filter-top').addEventListener('change',e=>{
      AppState.branchFilter=e.target.value;
      Render.page();
    });

    // modals close
    document.querySelectorAll('[data-close]').forEach(btn=> btn.addEventListener('click',()=> UI.closeModal(btn.dataset.close)));

    // lead form submit
    document.getElementById('lead-form').addEventListener('submit',e=>{
      e.preventDefault();
      const form=e.target;
      const data=Object.fromEntries(new FormData(form).entries());
      // checkboxes
      data.jewelleryInterest=[...form.querySelectorAll('[name=jewelleryInterest]:checked')].map(cb=>cb.value);
      // duplicate mobile detection
      const mobile=data.mobile.trim();
      const existing=AppState.db.leads.find(l=>l.mobile===mobile && l.id!==AppState.editingLeadId);
      if(existing && !confirm('Mobile already exists. Continue?')) return;
      const now=Date.now();
      if(AppState.editingLeadId){
        const idx=AppState.db.leads.findIndex(l=>l.id===AppState.editingLeadId);
        AppState.db.leads[idx]={...AppState.db.leads[idx],...data,updatedAt:now};
      }else{
        const id='l'+now;
        AppState.db.leads.unshift({id,...data,createdAt:now,updatedAt:now});
      }
      DB.save(AppState.db);
      UI.closeModal('modal-lead');
      Render.openLeadForm=null;
      Render.page();
    });

    // branch form
    document.getElementById('branch-form').addEventListener('submit',e=>{
      e.preventDefault();
      const f=e.target;
      const data={name:f.name.value.trim(),code:f.code.value.trim(),address:f.address.value.trim(),phone:f.phone.value.trim()};
      if(AppState.editingBranchId){
        const b=AppState.db.branches.find(x=>x.id===AppState.editingBranchId);
        Object.assign(b,data);
      }else{
        AppState.db.branches.push({id:'b'+Date.now(),...data});
      }
      DB.save(AppState.db);
      UI.closeModal('modal-branch');
      Render.page();
    });

    // staff form
    document.getElementById('staff-form').addEventListener('submit',e=>{
      e.preventDefault();
      const f=e.target;
      const data={name:f.name.value.trim(),role:f.role.value,branchId:f.branchId.value,mobile:f.mobile.value.trim(),email:f.email.value.trim()};
      if(AppState.editingStaffId){
        const s=AppState.db.staff.find(x=>x.id===AppState.editingStaffId);
        Object.assign(s,data);
      }else{
        AppState.db.staff.push({id:'s'+Date.now(),...data});
      }
      DB.save(AppState.db);
      UI.closeModal('modal-staff');
      Render.page();
    });
  }

  // INIT
  function init(){
    const sess=Auth.currentUser();
    if(sess){
      AppState.user=AppState.db.users.find(u=>u.username===sess.username);
      if(AppState.user){
        UI.showApp();
      }else{
        UI.showLogin();
      }
    }else{
      UI.showLogin();
    }
    bindGlobal();
  }

  init();
})();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
